<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tranquillitas</title>

  <!-- ─── FAVICON (SVG inline — dot coral Tranquillitas) ─── -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23F5F2EC'/><circle cx='16' cy='16' r='9' fill='url(%23g)'/><defs><radialGradient id='g' cx='35%25' cy='35%25' r='65%25'><stop offset='0' stop-color='%23E8A598'/><stop offset='1' stop-color='%23c97b6b'/></radialGradient></defs></svg>"/>
  <link rel="alternate icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23F5F2EC'/><circle cx='16' cy='16' r='9' fill='%23E8A598'/></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { background: #F5F2EC; overflow: hidden; }

    /* Wrapper yang bakal slide ke atas */
    #splashWrapper {
      position        : fixed;
      inset           : 0;
      z-index         : 9999;
      display         : flex;
      align-items     : center;
      justify-content : center;
      background      : #F5F2EC;
    }

    /* Blobs */
    .blob {
      position      : absolute;
      border-radius : 50%;
      filter        : blur(80px);
      animation     : drift 10s ease-in-out infinite alternate;
    }
    .blob-1 { width:380px; height:380px; background:#C9B8D8; opacity:0.3; top:-100px; right:-80px; }
    .blob-2 { width:300px; height:300px; background:#A8C5A0; opacity:0.3; bottom:-80px; left:-60px; animation-delay:3s; }
    .blob-3 { width:200px; height:200px; background:#E8A598; opacity:0.2; top:45%; right:25%; animation-delay:6s; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(20px,25px) scale(1.05); }
    }

    @keyframes dotPulse {
      0%,100% { transform: scale(1);   opacity: 1; }
      50%     { transform: scale(1.4); opacity: 0.5; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Animasi slide ke atas keluar */
    @keyframes slideUpOut {
      from { transform: translateY(0); }
      to   { transform: translateY(-100vh); }
    }

    #splashWrapper.leaving {
      animation: slideUpOut 1s cubic-bezier(0.76, 0, 0.24, 1) forwards;
    }

    /* Konten */
    .splash-content {
      position       : relative;
      z-index        : 10;
      display        : flex;
      flex-direction : column;
      align-items    : center;
      gap            : 20px;
    }

    .logo-row {
      display     : flex;
      align-items : center;
      gap         : 14px;
      animation   : fadeUp 0.9s ease 0.2s both;
    }

    .logo-dot {
      width         : 22px;
      height        : 22px;
      border-radius : 50%;
      background    : radial-gradient(circle at 35% 35%, #E8A598, #c97b6b);
      animation     : dotPulse 2.5s ease-in-out infinite;
    }

    .logo-text {
      font-family    : 'DM Serif Display', serif;
      font-size      : 3rem;
      color          : #1f2937;
      letter-spacing : -0.02em;
    }

    .tagline {
      font-size      : 12px;
      color          : #9ca3af;
      font-weight    : 500;
      letter-spacing : 0.1em;
      text-transform : uppercase;
      animation      : fadeUp 0.9s ease 0.45s both;
    }

    .bar-wrap {
      width         : 180px;
      height        : 2px;
      background    : rgba(0,0,0,0.08);
      border-radius : 999px;
      overflow      : hidden;
      margin-top    : 4px;
      animation     : fadeUp 0.9s ease 0.65s both;
    }

    .bar-fill {
      height        : 100%;
      width         : 0%;
      border-radius : 999px;
      background    : linear-gradient(90deg, #A8C5A0, #C9B8D8, #E8A598);
      transition    : width 3.4s cubic-bezier(0.75, 0, 0.24, 1);
    }

    .quote {
      font-family : 'DM Serif Display', serif;
      font-size   : 13px;
      color       : #c8bfb3;
      font-style  : italic;
      margin-top  : 4px;
      animation   : fadeUp 0.9s ease 0.85s both;
    }
  </style>
</head>

<body>

  <div id="splashWrapper">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="splash-content">
      <div class="logo-row">
        <div class="logo-dot"></div>
        <span class="logo-text">Tranquillitas</span>
      </div>
      <p class="tagline">Ruang aman untuk kesehatan mentalmu</p>
      <div class="bar-wrap">
        <div class="bar-fill" id="barFill"></div>
      </div>
      <p class="quote">"Satu langkah kecil sudah cukup untuk hari ini."</p>
    </div>
  </div>

  <script>
    const wrapper = document.getElementById('splashWrapper');
    const bar     = document.getElementById('barFill');

    // Loading bar mulai jalan
    setTimeout(() => bar.style.width = '100%', 300);

    // Slide wrapper ke atas setelah 3 detik
    setTimeout(() => wrapper.classList.add('leaving'), 3200);

    // Redirect ke index.html setelah animasi selesai
    setTimeout(() => window.location.href = 'index.html', 4050);
  </script>

</body>
</html>
